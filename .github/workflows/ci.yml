# HR Office Platform — CI/CD Pipeline
# Recommended branch protection: require PR, 1+ approvals, required status checks

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.18.0"
  CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
  NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}

jobs:
  lint:
    name: "🔍 Lint (strict)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - name: ESLint (max-warnings=0 where possible; enforced on changed files)
        run: npm run lint
      - name: Prettier check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

  type-check:
    name: "🔠 Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - run: npx tsc --noEmit

  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - run: npm run test:coverage -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports/junit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: reports/junit/
          retention-days: 30

  # ═════════════════════════════════════════════════════════════
  # SECURITY — supply-chain + static analysis
  # ═════════════════════════════════════════════════════════════
  security-audit:
    name: "🔒 Security Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: npm audit (high+ only, non-blocking for low)
        run: npm audit --audit-level=high
        continue-on-error: false
      - name: Dependency Review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  codeql:
    name: "🔒 CodeQL Static Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: +security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  build:
    name: "🏗 Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, type-check, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - run: npm run build
        env:
          NEXTAUTH_SECRET: build-placeholder-NEXTAUTH_SECRET-value-32chars-min
          AUTH_SECRET: build-placeholder-AUTH_SECRET-value-32chars-min-x
          JWT_SECRET: build-placeholder-JWT_SECRET-value-must-be-at-least-32-chars-long
          CSRF_SECRET: build-placeholder-CSRF_SECRET-value-32chars-min
          NEXTAUTH_URL: https://hr-project-sigma.vercel.app
          AUTH_URL: https://hr-project-sigma.vercel.app
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          AUTH_GOOGLE_ID: build-placeholder
          AUTH_GOOGLE_SECRET: build-placeholder
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  e2e-tests:
    name: "🎭 E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit
      - run: npm run test:e2e
        env:
          NEXTAUTH_SECRET: test-secret-for-ci-only-not-for-production
          AUTH_SECRET: test-secret-for-ci-only-not-for-production
          JWT_SECRET: test-secret-for-ci-only-not-for-production-32chars-xxx
          CSRF_SECRET: test-secret-for-ci-only-not-for-production
          NEXTAUTH_URL: http://localhost:3000
          AUTH_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  deploy-preview:
    name: "🔍 Deploy Preview"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm install -g vercel
      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$URL" >> $GITHUB_OUTPUT

  deploy-production:
    name: "🚀 Deploy Production"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, e2e-tests, codeql, security-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://hr-project-sigma.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm install -g vercel
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production-url=$URL" >> $GITHUB_OUTPUT
      - run: npm ci --prefer-offline --no-audit
      - run: npx convex deploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          sourcemaps: .next/static/chunks
        continue-on-error: true

# Required GitHub Secrets:
# VERCEL_TOKEN, CONVEX_DEPLOYMENT, NEXT_PUBLIC_CONVEX_URL,
# CONVEX_DEPLOY_KEY, SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT
