name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 🔍 Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 ESLint
        run: npm run lint

      - name: 🏷️ TypeScript type-check
        run: npm run type-check

      - name: 🧪 Jest tests
        run: npm test -- --passWithNoTests --ci

      - name: 📏 Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js
        run: npm run build
        env:
          # Stub env vars for build (не реальные ключи)
          NEXT_PUBLIC_CONVEX_URL: https://stub.convex.cloud
          NEXT_PUBLIC_APP_URL: https://stub.vercel.app
          CONVEX_DEPLOYMENT: dev:stub
          NEXTAUTH_SECRET: ci-stub-secret
          NEXTAUTH_URL: http://localhost:3000
          SENTRY_DSN: ''
          SKIP_ENV_VALIDATION: 'true'