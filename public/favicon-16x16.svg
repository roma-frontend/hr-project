<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-dark { fill: #0a0a1a; }
        .text-light { fill: #ffffff; }
        .gradient-stop1 { stop-color: #3b82f6; }
        .gradient-stop2 { stop-color: #8b5cf6; }
      }
      @media (prefers-color-scheme: light) {
        .bg-dark { fill: #ffffff; }
        .text-light { fill: #0a0a1a; }
        .gradient-stop1 { stop-color: #2563eb; }
        .gradient-stop2 { stop-color: #7c3aed; }
      }
    </style>
    <linearGradient id="grad16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="gradient-stop1" />
      <stop offset="100%" class="gradient-stop2" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" class="bg-dark" rx="16"/>
  
  <!-- Gradient accent -->
  <circle cx="128" cy="128" r="75" fill="url(#grad16)" opacity="0.15"/>
  
  <!-- HR Text - minimal for 16x16 -->
  <text x="128" y="148" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="60" font-weight="700" text-anchor="middle" class="text-light" letter-spacing="-1">
    HR
  </text>
</svg>