<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-dark { fill: #0a0a1a; }
        .text-light { fill: #ffffff; }
        .accent { fill: #3b82f6; }
        .gradient-stop1 { stop-color: #3b82f6; }
        .gradient-stop2 { stop-color: #8b5cf6; }
      }
      @media (prefers-color-scheme: light) {
        .bg-dark { fill: #ffffff; }
        .text-light { fill: #0a0a1a; }
        .accent { fill: #2563eb; }
        .gradient-stop1 { stop-color: #2563eb; }
        .gradient-stop2 { stop-color: #7c3aed; }
      }
    </style>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="gradient-stop1" />
      <stop offset="100%" class="gradient-stop2" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" class="bg-dark" rx="48"/>
  
  <!-- Gradient Circle -->
  <circle cx="128" cy="128" r="110" fill="url(#mainGradient)" opacity="0.15"/>
  
  <!-- Main Logo Circle -->
  <circle cx="128" cy="128" r="95" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- HR Text -->
  <text x="128" y="148" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="96" font-weight="700" text-anchor="middle" class="text-light" letter-spacing="-2">
    HR
  </text>
  
  <!-- Accent dot -->
  <circle cx="180" cy="96" r="6" fill="url(#mainGradient)"/>
</svg>