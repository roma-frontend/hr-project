<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-dark { fill: #0a0a1a; }
        .text-light { fill: #ffffff; }
        .gradient-stop1 { stop-color: #3b82f6; }
        .gradient-stop2 { stop-color: #8b5cf6; }
      }
      @media (prefers-color-scheme: light) {
        .bg-dark { fill: #ffffff; }
        .text-light { fill: #0a0a1a; }
        .gradient-stop1 { stop-color: #2563eb; }
        .gradient-stop2 { stop-color: #7c3aed; }
      }
    </style>
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="gradient-stop1" />
      <stop offset="100%" class="gradient-stop2" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners for iOS -->
  <rect width="256" height="256" class="bg-dark" rx="60"/>
  
  <!-- Subtle gradient background -->
  <rect width="256" height="256" fill="url(#appleGradient)" rx="60" opacity="0.08"/>
  
  <!-- Gradient Circle -->
  <circle cx="128" cy="128" r="110" fill="url(#appleGradient)" opacity="0.12" filter="url(#softGlow)"/>
  
  <!-- Main Logo Circle -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="url(#appleGradient)" stroke-width="2" opacity="0.25"/>
  
  <!-- HR Text - Large and bold for iOS home screen -->
  <text x="128" y="152" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="100" font-weight="700" text-anchor="middle" class="text-light" letter-spacing="-2">
    HR
  </text>
  
  <!-- Accent elements -->
  <circle cx="185" cy="90" r="7" fill="url(#appleGradient)"/>
  <circle cx="95" cy="180" r="5" fill="url(#appleGradient)" opacity="0.6"/>
  
  <!-- Subtle shine effect -->
  <ellipse cx="100" cy="100" rx="60" ry="60" fill="white" opacity="0.03"/>
</svg>